spring.application.name=TradeWise
server.port=9092
tradewise.dhan.enabled=false
tradewise.dhan.trades-url=https://api.dhan.co/v2/trades
tradewise.dhan.positions-url=https://api.dhan.co/v2/positions
tradewise.dhan.orders-url=https://api.dhan.co/v2/orders
tradewise.dhan.access-token=${DHAN_ACCESS_TOKEN:}
tradewise.dhan.client-id=${DHAN_CLIENT_ID:}
tradewise.dhan.timeout-seconds=15
tradewise.dhan.tls-protocol=TLSv1.2
tradewise.dhan.insecure-ssl=false
tradewise.dhan.max-trades=10
tradewise.dhan.max-loss=10000
tradewise.dhan.max-profit=25000
tradewise.dhan.cooldown-minutes-after-exit=15

# ─── AUTO-EXIT on limit breach ────────────────────────────────────────────────
# When true: EXITS ALL open positions immediately when any P&L/trade limit is hit.
# This prevents further loss/profit movement on open positions after the limit is crossed.
# Recommended: true (protects against the 5-second polling gap)
tradewise.dhan.auto-exit-on-limit=true

# ─── TRAILING PROFIT STOP ─────────────────────────────────────────────────────
# Protects peak profits from being erased by sudden market reversals.
#
# How it works:
#   1. Once your P&L reaches 'profit-trailing-activation-level', trailing begins.
#   2. The system tracks your PEAK P&L (high-water mark).
#   3. If your P&L drops 'profit-trailing-drawdown' below that peak → EXIT + LOCK.
#
# Example: activation=20000, drawdown=5000
#   - Profit grows to ₹30,000 (peak)
#   - Profit then drops to ₹24,999 (dropped ₹5,001 from peak → TRIGGERS EXIT)
#   - You lock in ~₹25,000 instead of watching it fall to ₹10,000
#
# Set both to 0.0 to disable trailing stop.
tradewise.dhan.profit-trailing-activation-level=25000
tradewise.dhan.profit-trailing-drawdown=5000

# Cache TTL for Dhan API responses (seconds). Multiple backend endpoints are called per
# UI poll cycle; caching ensures only one real Dhan API call is made per window.
# Set to 0 to disable caching (not recommended — may cause HTTP 429 rate-limit errors).
tradewise.dhan.cache-ttl-seconds=30
